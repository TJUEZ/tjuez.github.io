---
layout: default
---
<style>
    .post-header { padding: 80px 0 60px; }
    .post-header .post-meta { font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--amber); margin-bottom: 16px; letter-spacing: 0.5px; }
    .post-header h1 { font-size: 40px; font-weight: 800; line-height: 1.2; margin-bottom: 20px; }
    .post-content { padding: 40px 0 80px; font-size: 16px; color: var(--text-secondary); }
    .post-content h1, .post-content h2, .post-content h3 { color: var(--text-primary); margin: 40px 0 16px; font-weight: 700; }
    .post-content h1 { font-size: 28px; }
    .post-content h2 { font-size: 22px; }
    .post-content h3 { font-size: 18px; }
    .post-content p { margin-bottom: 20px; }
    .post-content a { color: var(--amber); text-decoration: none; }
    .post-content a:hover { text-decoration: underline; }
    .post-content code { font-family: 'IBM Plex Mono', monospace; background: var(--bg-elevated); padding: 2px 6px; border-radius: 3px; font-size: 14px; color: var(--amber); }
    .post-content pre { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; overflow-x: auto; margin: 24px 0; }
    .post-content pre code { background: none; padding: 0; color: var(--text-primary); }
    .post-content ul, .post-content ol { margin: 20px 0; padding-left: 24px; }
    .post-content li { margin-bottom: 8px; }
    .post-content blockquote { border-left: 3px solid var(--amber); padding-left: 20px; margin: 24px 0; color: var(--text-muted); font-style: italic; }
    .post-content img { max-width: 100%; border-radius: 6px; margin: 24px 0; }
    .back-link { display: inline-block; margin-top: 40px; color: var(--amber); text-decoration: none; font-size: 14px; font-family: 'IBM Plex Mono', monospace; }
    .back-link:hover { text-decoration: underline; }
</style>

<article>
    <div class="container">
        <header class="post-header">
            <div class="post-meta">{{ page.date | date: "%Y-%m-%d" }}</div>
            <h1>{{ page.title }}</h1>
        </header>
        <div class="post-content">
            {{ content }}
        </div>
        <a href="/blog.html" class="back-link">← Back to Blog</a>
    </div>
</article>
