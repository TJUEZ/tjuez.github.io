---
layout: default
---
<style>
    .post-header { padding: 60px 0 48px; border-bottom: 1px solid var(--border); margin-bottom: 0; }
    .post-header .post-category { font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; color: var(--amber); margin-bottom: 12px; letter-spacing: 0.5px; text-transform: uppercase; }
    .post-header .post-category::before { content: '// '; color: var(--text-muted); }
    .post-header h1 { font-size: 2.5rem; font-weight: 800; line-height: 1.2; margin-bottom: 0; max-width: 680px; }
    .post-content { padding: 48px 0 80px; }
    .post-content h1, .post-content h2, .post-content h3 { color: var(--text-primary); margin: 2em 0 0.75em; font-weight: 700; line-height: 1.3; }
    .post-content h1 { font-size: 1.75rem; }
    .post-content h2 { font-size: 1.4rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
    .post-content h3 { font-size: 1.15rem; }
    .post-content p { color: var(--text-primary); margin-bottom: 1.25em; line-height: 1.85; font-size: 1.05rem; }
    .post-content a { color: var(--amber); text-decoration: none; }
    .post-content a:hover { text-decoration: underline; }
    .post-content code { font-family: 'IBM Plex Mono', monospace; background: var(--bg-elevated); padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    .post-content pre { background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; overflow-x: auto; margin: 1.5em 0; }
    .post-content pre code { background: none; padding: 0; color: var(--text-primary); font-size: 0.9rem; }
    .post-content ul, .post-content ol { color: var(--text-primary); margin: 1.25em 0; padding-left: 1.5em; }
    .post-content li { margin-bottom: 0.5em; line-height: 1.7; }
    .post-content blockquote { border-left: 3px solid var(--amber); padding-left: 20px; margin: 1.5em 0; color: var(--text-secondary); font-style: italic; }
    .post-content img { max-width: 100%; border-radius: 8px; margin: 1.5em 0; }
    .post-content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    .back-link { display: inline-block; margin-top: 48px; color: var(--text-secondary); text-decoration: none; font-size: 0.9rem; font-family: 'IBM Plex Mono', monospace; transition: color 0.2s; }
    .back-link:hover { color: var(--amber); }
    .back-link::before { content: '← '; }
</style>

<article>
    <div class="container">
        <header class="post-header">
            {% if page.type %}
            <div class="post-category">{{ page.type }}</div>
            {% endif %}
            <h1>{{ page.title }}</h1>
        </header>
        <div class="post-content content-body">
            {{ content }}
        </div>
        <a href="/blog.html" class="back-link">Back to Blog</a>
    </div>
</article>
