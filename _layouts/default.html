<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - TJUEZ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --bg-surface: #141414;
            --bg-elevated: #1c1c1c;
            --text-primary: #e8e8e3;
            --text-secondary: #8a8a80;
            --text-muted: #555550;
            --amber: #ff9f1c;
            --amber-dim: #cc7f16;
            --border: #2a2a28;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            line-height: 1.7;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 0 32px; }
        header { padding: 24px 0; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg-deep); z-index: 100; }
        header .container { display: flex; justify-content: space-between; align-items: center; }
        .logo { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 18px; color: var(--amber); text-decoration: none; }
        .nav-links { display: flex; gap: 32px; list-style: none; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--amber); }
        footer { padding: 40px 0; border-top: 1px solid var(--border); margin-top: 80px; }
        footer p { color: var(--text-muted); font-size: 13px; font-family: 'IBM Plex Mono', monospace; }

        /* Reading content styles */
        .content-body {
            max-width: 680px;
        }
        .content-body h1, .content-body h2, .content-body h3, .content-body h4 {
            color: var(--text-primary);
            margin: 1.5em 0 0.5em;
            font-weight: 700;
            line-height: 1.3;
        }
        .content-body h1 { font-size: 2rem; }
        .content-body h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
        .content-body h3 { font-size: 1.25rem; }
        .content-body p { color: var(--text-primary); margin-bottom: 1em; line-height: 1.8; }
        .content-body a { color: var(--amber); text-decoration: none; }
        .content-body a:hover { text-decoration: underline; }
        .content-body code { font-family: 'IBM Plex Mono', monospace; font-size: 0.9em; background: var(--bg-elevated); padding: 2px 6px; border-radius: 3px; }
        .content-body pre { background: var(--bg-surface); padding: 20px; border-radius: 8px; overflow-x: auto; margin: 1.5em 0; }
        .content-body pre code { background: none; padding: 0; }
        .content-body ul, .content-body ol { color: var(--text-primary); margin: 1em 0; padding-left: 1.5em; }
        .content-body li { margin-bottom: 0.5em; line-height: 1.7; }
        .content-body blockquote { border-left: 3px solid var(--amber); padding-left: 20px; margin: 1.5em 0; color: var(--text-secondary); font-style: italic; }
        .content-body img { max-width: 100%; height: auto; border-radius: 8px; margin: 1.5em 0; }
        .content-body hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <a href="{{ site.baseurl }}/" class="logo">TJUEZ</a>
            <ul class="nav-links">
                <li><a href="{{ site.baseurl }}/">Home</a></li>
                <li><a href="{{ site.baseurl }}/blog.html" class="active">Blog</a></li>
            </ul>
        </div>
    </header>

    {{ content }}

    <footer>
        <div class="container">
            <p>&lt;/&gt; by TJUEZ</p>
        </div>
    </footer>
</body>
</html>
